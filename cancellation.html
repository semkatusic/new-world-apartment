<body style="font-family:Arial;max-width:800px;margin:40px auto;line-height:1.6">

<h1>Stornobedingungen</h1>

<h2>Kurzaufenthalte (bis 5 Nächte)</h2>
<p>
Kostenlose Stornierung bis 24 Stunden vor Anreise möglich.
</p>

<h2>Längere Aufenthalte (ab 7 Nächten)</h2>
<p>
Keine kostenlose Stornierung möglich.
</p>

<h2>Nichtanreise</h2>
<p>
Bei Nichtanreise wird der volle Betrag einbehalten.
</p>
