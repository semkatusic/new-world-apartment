const t={
en:{title:"Booking Terms",text:"<h2>Booking & payment</h2><p>A direct booking is confirmed only after full payment via Stripe or PayPal.</p><h2>Check-in / Check-out</h2><p>Check-in from 15:00. Check-out until 10:00.</p><h2>House rules</h2><ul><li>No smoking</li><li>No pets</li><li>No parties or events</li><li>The apartment may only be used by registered guests</li></ul><h2>Invoices</h2><p>Invoices are issued on request. Private rental – no VAT charged.</p><h2>Platform bookings</h2><p>Bookings through Airbnb or Booking.com are subject to the terms of those platforms.</p>"},
de:{title:"Buchungsbedingungen / AGB",text:"<h2>Buchung & Zahlung</h2><p>Eine Direktbuchung wird erst nach vollständiger Bezahlung über Stripe oder PayPal bestätigt.</p><h2>Check-in / Check-out</h2><p>Check-in ab 15:00 Uhr. Check-out bis 10:00 Uhr.</p><h2>Hausregeln</h2><ul><li>Rauchen verboten</li><li>Keine Haustiere</li><li>Keine Partys oder Veranstaltungen</li><li>Das Apartment darf nur von angemeldeten Gästen genutzt werden</li></ul><h2>Rechnungen</h2><p>Rechnungen werden auf Anfrage ausgestellt. Privatvermietung – keine Umsatzsteuer ausgewiesen.</p><h2>Plattformbuchungen</h2><p>Für Buchungen über Airbnb oder Booking.com gelten die Bedingungen der jeweiligen Plattform.</p>"},
hr:{title:"Uvjeti rezervacije",text:"<h2>Rezervacija i plaćanje</h2><p>Direktna rezervacija potvrđuje se tek nakon potpune uplate putem Stripea ili PayPala.</p><h2>Prijava / odjava</h2><p>Prijava od 15:00. Odjava do 10:00.</p><h2>Kućni red</h2><ul><li>Pušenje je zabranjeno</li><li>Kućni ljubimci nisu dozvoljeni</li><li>Zabave i događanja nisu dozvoljeni</li><li>Apartman smiju koristiti samo prijavljeni gosti</li></ul><h2>Računi</h2><p>Računi se izdaju na zahtjev. Privatni najam – PDV nije obračunat.</p><h2>Rezervacije putem platformi</h2><p>Za rezervacije putem Airbnb-a ili Booking.com-a vrijede uvjeti tih platformi.</p>"}
};
