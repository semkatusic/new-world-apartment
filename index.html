<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New World Apartment in Zagreb</title>
  <meta name="description" content="New World Apartment in Zagreb – stylish apartment with direct booking, Wi-Fi, air conditioning, kitchen, bathroom and private check-in." />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root{
      --navy:#071426;
      --cream:#f7f2e8;
      --cream2:#fbf8f1;
      --sand:#e8dfcf;
      --gold:#c9a45c;
      --text:#141414;
      --muted:#6b665d;
      --border:#dfd5c4;
      --white:#ffffff;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{margin:0;font-family:Inter,Arial,sans-serif;background:var(--cream);color:var(--text)}
    a{text-decoration:none;color:inherit}
    img{max-width:100%;display:block}
    .wrap{max-width:1200px;margin:0 auto;padding:0 26px}

    .eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:.42em;color:var(--muted);font-weight:700;margin:0 0 18px}
    .line{height:1px;width:170px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:28px 0}
    h1,h2,h3{font-family:'Playfair Display',serif;color:var(--navy);font-weight:500;margin:0}
    h1{font-size:clamp(22px,3vw,36px);line-height:1.45;letter-spacing:.10em;text-transform:uppercase}
    h2{font-size:clamp(28px,3.4vw,44px);line-height:1.22;letter-spacing:-.01em}
    h3{font-size:clamp(24px,2.6vw,34px);line-height:1.22}
    p{font-size:15px;line-height:1.72;color:#444}
    .lead{font-size:20px;line-height:1.75;color:#47443e;max-width:760px}

    .nav{position:fixed;top:0;left:0;right:0;z-index:20;background:rgba(7,20,38,.84);backdrop-filter:blur(18px);border-bottom:1px solid rgba(255,255,255,.12);color:white}
    .nav-inner{max-width:1240px;margin:auto;padding:12px 26px;display:flex;align-items:center;justify-content:space-between;gap:18px}
    .brand{display:flex;align-items:center;gap:14px;min-width:160px}
    .brand img{height:58px;width:auto;object-fit:contain}
    .brand-stars{color:var(--gold);font-size:16px;letter-spacing:.12em;white-space:nowrap}
    .nav-links{display:flex;align-items:center;gap:22px;font-size:11px;text-transform:uppercase;letter-spacing:.18em;font-weight:600}
    .nav-links a{opacity:.84}.nav-links a:hover{opacity:1;color:var(--gold)}
    .nav-right{display:flex;align-items:center;gap:14px}
    .lang-switch{display:flex;gap:7px;align-items:center;border:1px solid rgba(255,255,255,.18);padding:8px 10px}
    .lang-switch button{border:0;background:transparent;color:white;font-size:10px;letter-spacing:.16em;cursor:pointer;padding:0 3px;font-weight:700}
    .lang-switch button.active{color:var(--gold)}
    .reserve{background:var(--gold);color:var(--navy);padding:13px 17px;font-size:11px;text-transform:uppercase;letter-spacing:.20em;font-weight:800}

    .hero{min-height:100vh;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;background:var(--navy)}
    .hero-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.92}
    .hero:after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,rgba(7,20,38,.48),rgba(7,20,38,.16),rgba(7,20,38,.16))}
    .hero-content{position:relative;z-index:2;width:100%;min-height:100vh;display:flex;justify-content:center;align-items:center;text-align:center;padding:0 26px;color:white}
    .hero-card{display:flex;justify-content:center;align-items:center;text-align:center;margin:0 auto;max-width:820px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.32);backdrop-filter:blur(6px);padding:22px 34px;border-radius:2px}
    .hero-card h1{font-family:'Playfair Display',serif;font-size:clamp(22px,3vw,36px);font-weight:400;letter-spacing:.10em;line-height:1.45;text-align:center;text-transform:uppercase;color:white;text-shadow:0 6px 26px rgba(0,0,0,.28)}

    .booking-card{max-width:1080px;margin:-64px auto 0;background:white;position:relative;z-index:5;padding:30px;box-shadow:0 24px 70px rgba(0,0,0,.16);border:1px solid rgba(0,0,0,.04)}
    .booking-grid{margin-top:24px;display:grid;grid-template-columns:repeat(3,1fr);gap:16px;align-items:end}
    label span{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.22em;color:var(--muted);font-weight:700;margin-bottom:8px}
    input,select,textarea{width:100%;padding:15px;border:1px solid #d8d2c7;background:white;font:inherit;color:var(--text);border-radius:0}
    button,.btn{border:0;background:var(--navy);color:white;padding:16px 20px;font-size:11px;text-transform:uppercase;letter-spacing:.22em;font-weight:800;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:8px;text-align:center}
    .btn-gold{background:var(--gold);color:var(--navy)}
    .btn-outline{background:transparent;color:var(--navy);border:1px solid var(--navy)}
    .note{margin-top:18px;background:var(--cream);padding:16px;color:#5c574f;line-height:1.6;font-size:14px}

    .guest-mini{background:white;border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:22px 0}
    .guest-mini-inner{max-width:1200px;margin:auto;padding:0 26px;display:flex;align-items:center;justify-content:space-between;gap:18px;flex-wrap:wrap}
    .guest-score{font-family:'Playfair Display',serif;font-size:34px;color:var(--navy);line-height:1}
    .guest-mini p{margin:0;color:#5b574f;font-size:14px}
    .guest-mini-stars{color:var(--gold);letter-spacing:.12em}

    .intro{padding:115px 26px 88px;text-align:center;background:var(--cream2)}
    .intro .line{margin:30px auto}
    .intro .lead{margin:0 auto}

    .split{display:grid;grid-template-columns:1fr 1fr;min-height:560px;background:var(--sand)}
    .split.reverse .split-img{order:2}
    .split.reverse .split-text{order:1}
    .split-img{height:560px;width:100%;object-fit:cover}
    .split-text{display:flex;align-items:center;padding:72px;background:var(--sand)}
    .split-text p:not(.eyebrow){line-height:1.8;color:#5b574f;max-width:560px}

    .amenities{padding:92px 0;background:white}
    .amenities-columns{display:grid;grid-template-columns:repeat(4,1fr);gap:54px;margin-top:42px}
    .amenities-column h4{font-size:11px;letter-spacing:.42em;text-transform:uppercase;color:var(--navy);margin:0 0 26px;font-weight:800}
    .amenities-column ul{list-style:none;padding:0;margin:0;display:grid;gap:13px}
    .amenities-column li{font-size:15px;line-height:1.4;color:#4c4943}

    .host{padding:92px 0;background:var(--navy);color:white}
    .host-grid{display:grid;grid-template-columns:.85fr 1.15fr;gap:70px;align-items:center}
    .host h2{color:white}
    .host .eyebrow{color:var(--gold)}
    .host p{color:rgba(255,255,255,.83)}
    .host .gold{font-family:'Playfair Display',serif;color:var(--gold);font-size:26px;line-height:1.35}
    .host-photo{width:100%;max-width:420px;border:1px solid rgba(255,255,255,.16);box-shadow:0 24px 70px rgba(0,0,0,.25);object-fit:cover;aspect-ratio:4/5}

    .contact{display:grid;grid-template-columns:1fr 1fr;background:var(--cream);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
    .contact-left{padding:78px 7vw}.contact-left h2{margin-bottom:28px}.contact-left .line{margin:26px 0 32px}.contact-left p{font-size:18px;line-height:1.55;color:#3f3c37}.contact-left strong{font-weight:800}.contact-buttons{display:flex;gap:16px;flex-wrap:wrap;margin-top:34px}
    .contact-form-box{background:#fff;padding:70px 5vw;border-left:1px solid var(--border)}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:22px}.contact-form label{display:block}.contact-form input,.contact-form textarea{margin-top:8px}.contact-form textarea{min-height:134px}.contact-form .full{grid-column:1/-1}.contact-form{display:grid;gap:24px}.form-label{font-size:11px;text-transform:uppercase;letter-spacing:.36em;color:#47443e;font-weight:700}

    .location{display:grid;grid-template-columns:1fr 1fr;background:var(--sand)}
    .location-info{padding:78px 7vw}.location-info h2{margin-bottom:25px}.location-info .line{margin:28px 0 32px}.location-text{font-size:20px;line-height:1.75;color:#41403b;max-width:650px}.location-features{display:grid;gap:17px;margin:34px 0}.location-feature{display:flex;align-items:center;gap:16px;color:#4e4a43}.location-icon{font-size:22px;color:var(--gold);width:24px}.maps-link{display:inline-flex;margin-top:18px;font-size:11px;letter-spacing:.36em;text-transform:uppercase;font-weight:800;color:var(--navy)}.map-frame{width:100%;height:100%;min-height:560px;border:0;filter:saturate(.75)}

    .footer{background:#fff;border-top:1px solid var(--border);padding:34px 26px}
    .footer-inner{max-width:1200px;margin:auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:20px}
    .footer-brand{display:flex;align-items:center;gap:12px}
    .footer-brand img{height:64px;width:auto}
    .footer-stars{color:var(--gold);font-size:18px;letter-spacing:.12em}

    .footer-legal{
      width:100%;
      text-align:center;
      font-size:12px;
      letter-spacing:.18em;
      text-transform:uppercase;
      color:#6b665d;
      display:flex;
      justify-content:center;
      gap:18px;
      flex-wrap:wrap;
      margin-top:10px;
    }
    .footer-legal a{color:#6b665d}
    .footer-legal a:hover{color:var(--gold)}

    @media(max-width:980px){
      .nav-links{display:none}
      .brand img{height:48px}
      .hero-card{padding:18px 24px;max-width:90%}
      .booking-card{margin:-42px 16px 0}
      .booking-grid,.split,.amenities-columns,.host-grid,.contact,.location{grid-template-columns:1fr}
      .split.reverse .split-img,.split.reverse .split-text{order:initial}
      .split-img{height:360px}
      .split-text{padding:44px 26px}
      .amenities-columns{gap:34px}
      .contact-form-box{border-left:0;border-top:1px solid var(--border)}
      .form-row{grid-template-columns:1fr}
      .map-frame{min-height:420px}
      .location-info,.contact-left,.contact-form-box{padding:54px 26px}
      .footer-inner{flex-direction:column;align-items:flex-start}
      .reserve{display:none}
    }
  </style>
</head>
<body>

  <header class="nav">
    <div class="nav-inner">
      <a class="brand" href="#top"><img src="images/logo.png"><span class="brand-stars">★★★</span></a>
      <div class="nav-right">
        <div class="lang-switch">
          <button onclick="setLang('en')">EN</button>
          <button onclick="setLang('de')">DE</button>
          <button onclick="setLang('hr')">HR</button>
        </div>
      </div>
    </div>
  </header>

  <section class="hero">
    <img class="hero-bg" src="images/zagreb-bedroom1.jpg">
    <div class="hero-content">
      <div class="hero-card">
        <h1 data-i18n="heroTitle">Welcome to New World Apartment in Zagreb</h1>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <img src="images/logo.png">
        <span class="footer-stars">★★★</span>
      </div>
      <div>© New World Apartment · Zagreb</div>
    </div>

    <div class="footer-legal">
      <a href="impressum.html">Impressum</a>
      <a href="privacy.html">Privacy</a>
      <a href="terms.html">Booking Terms</a>
      <a href="cancellation.html">Cancellation</a>
    </div>
  </footer>

  <script>
    const translations={
      en:{heroTitle:'Welcome to New World Apartment in Zagreb'},
      de:{heroTitle:'Willkommen im New World Apartment in Zagreb'},
      hr:{heroTitle:'Dobrodošli u New World Apartment u Zagrebu'}
    };

    function setLang(lang){
      localStorage.setItem('lang',lang);
      document.querySelectorAll('.lang-switch button').forEach(btn=>btn.classList.remove('active'));
      document.querySelectorAll('.lang-switch button').forEach(btn=>{
        if(btn.innerText.toLowerCase()===lang) btn.classList.add('active');
      });
      const dict=translations[lang]||translations.en;
      document.querySelectorAll('[data-i18n]').forEach(el=>{
        const key=el.getAttribute('data-i18n');
        if(dict[key]) el.innerText=dict[key];
      });
    }

    document.addEventListener('DOMContentLoaded',()=>{
      setLang(localStorage.getItem('lang')||'en');
    });
  </script>

</body>
</html>
