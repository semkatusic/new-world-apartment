<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New World Apartment Zagreb</title>

<style>
body{
  font-family: Arial, sans-serif;
  margin:0;
  background:#f7f2e8;
}

.hero{
  height:100vh;
  background:url('images/zagreb-bedroom1.jpg') center/cover no-repeat;
  display:flex;
  align-items:center;
  justify-content:center;
}

.hero-box{
  background:rgba(255,255,255,0.7);
  padding:30px;
  text-align:center;
}

h1{
  margin:0;
}

.booking{
  padding:40px;
  text-align:center;
}

input, select{
  padding:10px;
  margin:10px;
}

button{
  padding:12px 25px;
  background:#c9a45c;
  border:none;
  color:white;
  cursor:pointer;
}

#priceNote{
  margin-top:20px;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-box">
    <h1>New World Apartment</h1>
    <p>Downtown Zagreb</p>
  </div>
</div>

<!-- BOOKING -->
<div class="booking">

  <h2>Book your stay</h2>

  <input type="date" id="arrival">
  <input type="date" id="departure">

  <select id="guests">
    <option value="1">1 Guest</option>
    <option value="2" selected>2 Guests</option>
  </select>

  <br>

  <!-- BUTTON IST HIER SCHON RICHTIG -->
  <button onclick="checkBooking()">Book & Pay</button>

  <p id="priceNote"></p>

</div>

<script>
async function checkBooking(){

  const arrival = document.getElementById('arrival').value;
  const departure = document.getElementById('departure').value;
  const guests = document.getElementById('guests').value;
  const priceNote = document.getElementById('priceNote');

  if(!arrival || !departure || new Date(departure) <= new Date(arrival)){
    priceNote.textContent = 'Please select valid dates';
    return;
  }

  priceNote.textContent = 'Redirecting to payment...';

  try{

    const res = await fetch('/api/create-checkout-session',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({arrival, departure, guests})
    });

    const data = await res.json();

    if(data.url){
      window.location.href = data.url;
    }else{
      priceNote.textContent = data.error || 'Error';
    }

  }catch(e){
    priceNote.textContent = 'Connection error';
  }

}
</script>

</body>
</html>
